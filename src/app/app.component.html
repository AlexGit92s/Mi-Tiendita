<div class="min-h-screen font-sans flex flex-col bg-[#fcfcfc] text-[#333333]">
  <!-- Top Navigation Navbar: Glassmorphism -->
  <nav class="bg-white/70 backdrop-blur-md border-b border-lamour-blush/30 sticky top-0 z-50 transition-colors shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        
        <!-- Branding Logo -->
        <div class="flex-shrink-0 flex items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 text-lamour-gold">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
          <span class="font-serif text-2xl tracking-widest text-lamour-stone">
            Mi Tiendita <span class="font-light italic text-lamour-blush">L'Amour</span>
          </span>
        </div>

        <!-- Navigation Links -->
        <div class="hidden md:flex space-x-8">
          @if (isAdminRoute) {
            <a routerLink="/admin/dashboard" routerLinkActive="border-lamour-blush text-lamour-stone" class="border-transparent text-gray-500 hover:text-lamour-stone inline-flex items-center px-1 pt-1 border-b-2 text-xs uppercase tracking-widest font-medium transition-colors">
              Dashboard
            </a>
            <a routerLink="/admin/inventory" routerLinkActive="border-lamour-blush text-lamour-stone" class="border-transparent text-gray-500 hover:text-lamour-stone inline-flex items-center px-1 pt-1 border-b-2 text-xs uppercase tracking-widest font-medium transition-colors">
              Inventario
            </a>
            <a routerLink="/admin/reservations" routerLinkActive="border-lamour-blush text-lamour-stone" class="border-transparent text-gray-500 hover:text-lamour-stone inline-flex items-center px-1 pt-1 border-b-2 text-xs uppercase tracking-widest font-medium transition-colors">
              Apartados
            </a>
            <div class="border-l border-lamour-blush/30 mx-2 h-6 self-center"></div>
            <a routerLink="/catalog" class="text-lamour-gold hover:text-lamour-stone inline-flex items-center px-1 pt-1 text-xs uppercase tracking-widest font-medium transition-colors">
              Ver Catálogo &rarr;
            </a>
            <button
              type="button"
              (click)="logout()"
              class="text-gray-400 hover:text-red-600 inline-flex items-center px-1 pt-1 text-xs uppercase tracking-widest font-medium transition-colors"
              aria-label="Cerrar sesión"
            >
              Salir
            </button>
          } @else {
            <a routerLink="/catalog" routerLinkActive="border-lamour-blush text-lamour-stone" class="border-transparent text-gray-500 hover:text-lamour-stone inline-flex items-center px-1 pt-1 border-b-2 text-sm uppercase tracking-widest font-medium transition-colors">
              Catálogo
            </a>
            <a routerLink="/cart" routerLinkActive="border-lamour-blush text-lamour-stone" class="border-transparent text-gray-500 hover:text-lamour-stone inline-flex items-center px-1 pt-1 border-b-2 text-sm uppercase tracking-widest font-medium transition-colors group">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2 group-hover:scale-110 transition-transform text-lamour-blush">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
              </svg>              
              Mis Apartados
            </a>
            <div class="border-l border-lamour-blush/30 mx-2 h-6 self-center"></div>
            @if (auth.isAuthenticated()) {
              <a routerLink="/admin/dashboard" class="text-gray-400 hover:text-lamour-stone inline-flex items-center px-1 pt-1 text-xs uppercase tracking-widest font-medium transition-colors">
                Administración
              </a>
            } @else {
              <a routerLink="/login" class="text-gray-400 hover:text-lamour-stone inline-flex items-center px-1 pt-1 text-xs uppercase tracking-widest font-medium transition-colors">
                Acceso
              </a>
            }
          }
        </div>
        
        <!-- Mobile menu button -->
        <div class="md:hidden flex items-center">
          <button class="text-gray-500 hover:text-lamour-stone focus:outline-none">
            <svg class="h-6 w-6" stroke="currentColor" fill="none" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  <main class="flex-grow">
    <!-- Router Outlet for Child Pages -->
    <router-outlet></router-outlet>
  </main>
  
  <footer class="bg-white py-12 border-t border-lamour-blush/20 text-center mt-auto">
    <p class="text-xs uppercase tracking-widest text-lamour-stone mb-2 font-serif">Mi Tiendita L'Amour</p>
    <p class="text-[10px] uppercase tracking-[0.2em] text-gray-400">&copy; 2026 Mi Tiendita L'Amour. Todos los derechos reservados.</p>
  </footer>
</div>
